<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basics</title>
    <style>
        body {
            /* Background color set to Pink */
            background-color: pink;
            margin: 20px;
            font-family: sans-serif;
        }

        h1 {
            color: white;
            text-align: center;
            font-size: 3em;
        }

        .shop-container {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-bottom: 20px;
        }

        .shop-item {
            text-align: center;
        }

        .shop-item img {
            width: 200px; /* Adjust size as needed */
            height: auto;
            display: block;
            margin-bottom: 10px;
        }

        hr {
            border: 0;
            border-top: 1px solid black;
            width: 100%;
            margin: 20px 0;
        }

        .footer {
            text-align: right;
            font-style: italic;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <!-- Title with a special character -->
    <h1>Welcome to the Shop! &copy;</h1>

    <!-- Side by side images and links -->
    <div class="shop-container">
        <div class="shop-item">
            <img src="https://i.pinimg.com/736x/91/4c/ca/914cca69e63f581a5a37841fa4535a7f.jpg" alt="Shop 1">
            <a href="..." target="_blank">Visit SHEIN</a>
        </div>
        <div class="shop-item">
            <img src="https://i.pinimg.com/736x/48/96/26/4896262196206254e3eaac5e0c88dc2a.jpg" alt="Shop 2">
            <a href="..." target="_blank">Visit SHOP</a>
        </div>
    </div>

    <!-- Horizontal line -->
    <hr>

    <!-- Footer with copyright, login, and year -->
    <div class="footer">
        &copy; login 2026
    </div>

</body>
</html>
