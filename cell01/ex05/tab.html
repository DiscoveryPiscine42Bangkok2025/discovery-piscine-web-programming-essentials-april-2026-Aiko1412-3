<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exercise 05 - Tab</title>
    <style>
        
        table {
            width: 100%;
            border-collapse: collapse; 
        }
        td {
            height: 150px;           
            padding: 10px;          
            border: 1px solid #777; 
            vertical-align: middle; 
        }
        
        .box1 {
            background-color: #bcc481; 
            width: 50%;
        }
        .box2 {
            background-color: #f7bdad; 
            width: 50%;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <td class="box1">First cell</td>
            <td class="box2">Second cell</td>
        </tr>
    </table>

</body>
</html>
