<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax Experience</title>
    <link rel="stylesheet" href="parallax.css">
</head>
<body>

    <!-- Section 1: First Image -->
    <div class="parallax-section bg1">
        <div class="caption">
            <span class="border">SCROLL DOWN</span>
        </div>
    </div>

    <!-- Section 2: Black Block -->
    <div class="dark-section">
        <h3>Section Two</h3>
        <p>This is a black block with a message of your choice. The image stays fixed behind as you move.</p>
    </div>

    <!-- Section 3: Second Image -->
    <div class="parallax-section bg2">
        <div class="caption">
            <span class="border">THE END</span>
        </div>
    </div>

</body>
</html>
