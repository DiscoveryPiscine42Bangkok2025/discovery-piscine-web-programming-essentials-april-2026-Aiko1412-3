<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Card</title>
    <link rel="stylesheet" href="card.css">
</head>
<body>
    <div class="card">
        <h1>My Profile Card</h1>
        <table>
            <tr>
                <td rowspan="3" class="profile-pic-cell">
                    <img src="https://i.pinimg.com/736x/fa/29/57/fa29578fe102b7a1e3c8e270776ee92f.jpg" alt="Profile Picture" class="profile-pic">
                </td>
                <td class="info-cell">
                    <div class="login">Aiko</div>
                    <div class="description">...</div>
                </td>
            </tr>
            <tr>
                <td class="social-cell">
                    <a href="#"><img src="https://i.pinimg.com/1200x/99/7b/0a/997b0a243df40b681d8c8177724f1b45.jpg" alt="Notion" class="social-icon"></a>
                    <a href="#"><img src="https://i.pinimg.com/1200x/01/e6/21/01e621158668a4b8b7c92f1d1671bd43.jpg" alt="VS CODE" class="social-icon"></a>
                    <a href="#"><img src="https://i.pinimg.com/736x/8f/ba/57/8fba573c52d59dbe768c835cee527ebd.jpg" alt="Social 3" class="social-icon"></a>
                </td>
            </tr>
            <tr>
                <td></td>
            </tr>
        </table>
        <button class="contact-btn">Contact</button>
    </div>
</body>
</html>
