<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="card.css">
    <title>User Profile Card</title>
</head>
<body>

    <!-- Invisible table used for alignment as per instructions -->
    <table class="profile-card">
        <thead>
            <tr>
                <th><h1>User Profile Card</h1></th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>
                    <!-- Profile Picture -->
                    <img src="https://i.pinimg.com/736x/dc/a0/c0/dca0c026b56aeafabf6862f910cfbf89.jpg" alt="Profile " class="profile-img">
                </td>
            </tr>
            <tr>
                <td class="info-section">
                    <!-- Login/Name -->
                    <h2>Aiko</h2>
                    
                    <!-- 2-3 words description -->
                    <p class="description">Level 0, nothing</p>
                    <p class="sub-description">Bkk</p>
                    
                    <!-- Social Network Images -->
                    <div class="social-links">
                        <img src="https://i.pinimg.com/736x/99/7b/0a/997b0a243df40b681d8c8177724f1b45.jpg" alt="Notion">
                        <img src="https://i.pinimg.com/736x/e0/ea/91/e0ea91627970e66f2e1702263110ef15.jpg" alt="Ig">
                        <img src="https://i.pinimg.com/736x/14/23/70/142370ab227a6180cd9aac5b2bf46647.jpg" alt="github">
                    </div>
                </td>
            </tr>
            <tr>
                <td>
                    <!-- Clickable Button -->
                    <button class="contact-btn">Contact</button>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
