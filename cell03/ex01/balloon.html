<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explode this balloon</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #eee;
        }
        #balloon {
            width: 200px;
            height: 200px;
            background: red;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.15s ease;
        }
    </style>
</head>
<body>
    <div id="balloon"></div>

    <script>
        const balloon = document.getElementById('balloon');
        const INIT = 200;
        const EXPLODE = 420;
        const colors = ["red", "green", "blue"];

        let size = INIT;
        let colorIdx = 0;

        function render() {
            balloon.style.width = size + "px";
            balloon.style.height = size + "px";
            balloon.style.backgroundColor = colors[colorIdx];
        }

        // Click: grow +10, forward color
        balloon.addEventListener("click", () => {
            size += 10;
            if(size > EXPLODE){
                size = INIT;
                colorIdx = 0;
            } else {
                colorIdx = (colorIdx + 1) % colors.length;
            }
            render();
        });

        // Mouseleave: ONLY reverse color IF we shrink size
        balloon.addEventListener("mouseleave", () => {
            let didShrink = false;
            if(size > INIT){
                size -= 5;
                didShrink = true;
            }
            // Reverse color ONE TIME only when shrinking
            if(didShrink){
                colorIdx = (colorIdx - 1 + colors.length) % colors.length;
            }
            render();
        });

        render();
    </script>
</body>
</html>
