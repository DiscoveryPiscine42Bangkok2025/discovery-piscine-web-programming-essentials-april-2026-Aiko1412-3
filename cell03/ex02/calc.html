<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>It's over 9000 Calculator</title>
    <script src="calc.js" defer></script>
</head>
<body>
    <form id="calculator">
        <input type="text" id="left_member" name="left_member">
        <select id="operator" name="operator">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
            <option value="%">%</option>
        </select>
        <input type="text" id="right_member" name="right_member">
        <input type="submit" value="Try me!" id="try_me">
    </form>
</body>
</html>
