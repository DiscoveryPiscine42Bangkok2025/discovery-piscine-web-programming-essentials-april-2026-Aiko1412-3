<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <!-- Google Font (Inter - easy to swap) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ==============================================
           🎨 EASY EDIT ZONE (CHANGE EVERYTHING HERE)
           ============================================== */
        :root {
            /* 🖌️ FONT COLORS */
            --heading-color: #ffffff;    /* PORTFOLIO title color */
            --subtitle-color: #c9c9c9;  /* Subtitle text color */
            --button-text-color: #ffffff; /* Button text color */
            --button-hover-text: #e87084; /* Button hover text color */

            /* 🌸 BACKGROUND SETTINGS */
            --bg-image: url('https://media.discordapp.net/attachments/1138825323945930832/1490620887676883074/file_000000009730720bad4082b5b157992f.png?ex=69d4b862&is=69d366e2&hm=e3dcb375c7994078445e0de560075f4e3a540e437361c8cb779d0512d9f3fc39&=&format=webp&quality=lossless&width=1848&height=1232'); /* Your background image */
            --blur-strength: 2px; /* Blur amount (4px = less, 12px = more) */
            --overlay-darkness: 0.45; /* Dark overlay (0.3 = lighter, 0.5 = darker) */

            /* 🎀 DECORATION COLORS */
            --accent-color: #ffffff; /* Soft pink for decorations (change to any color) */
        }

        /* ==============================================
           🌐 GLOBAL RESET & BASE STYLES
           ============================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* keep center, add negative margin below */
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
             margin-top: 0px; /* ✨ MOVE ALL CONTENT UP - core line! */
            }
        /* 🖼️ GLASS FRAME (NEW - WRAPS WHOLE PAGE) */
        .glass-frame {
            position: absolute;
            top: 50px;
            left: 50px;
            right: 50px;
            bottom: 50px;
            border-radius: 20px; /* Rounded corners */
            border: 1.5px solid rgba(255,255,255,0.25); /* Soft white border */
            background: rgba(255,255,255,0.05); /* Faint glass bg */
            backdrop-filter: blur(6px); /* Glass blur (matches your buttons) */
            z-index: -1; /* Sits BEHIND all content */
            box-shadow: 0 0 30px rgba(0,0,0,0.2); /* Subtle shadow for depth */
        }

        /* ==============================================
           🌸 YOUR FLORAL BACKGROUND WITH BLUR
           ============================================== */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(var(--blur-strength)) brightness(0.85);
            z-index: -2;
        }

        /* Dark overlay for readability */
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, var(--overlay-darkness));
            z-index: -1;
        }

        /* ==============================================
           📝 TEXT STYLES (EASY COLOR CHANGE)
           ============================================== */
        h1 {
            font-family:'Bodoni Moda', serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 1rem;
            text-transform: uppercase;
            position: relative;
            top: -40px;
            z-index: 1;
            color: var(--heading-color);
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
        }

        .subtitle {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            color: var(--subtitle-color);
            margin-bottom: 2.5rem;
            font-weight: 400;
            position: relative;
            top: -35px;
            z-index: 1;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
        }

        /* ==============================================
           🔘 BUTTON STYLES
           ============================================== */
        .button-container {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            position: relative;
            top: -25px;
            z-index: 1;
            
        }
        

        .resume-btn {
            font-family:'Inconsolata', serif;
            padding: 0.875rem 2.5rem;
            border: 1.5px solid rgba(255,255,255,0.3);
            background-color: rgba(196, 182, 182, 0.3);
            backdrop-filter: blur(4px);
            color: var(--button-text-color);
            font-size: 0.95rem;
            font-weight: 500;
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: 0.05em;
            transition: all 1s ease;
            cursor: pointer;
            border-radius: 2px;
        }

        .resume-btn:hover {
            background-color: var(--button-text-color);
            color: var(--button-hover-text);
            transform: translateY(-2px);
        }

        /* ==============================================
           🎀 DECORATION ELEMENTS (EASY TO ADD/EDIT)
           ============================================== */
        .decoration {
            position: absolute;
            z-index: 0;
            opacity: 0.7;
            pointer-events: none;
        }

        /* Example: Add a small rose decoration (replace with your image) */
        .decoration-rose {
            top: 5%;
            left: 5%;
            width: 120px;
            height: auto;
        }

        .decoration-rose-2 {
            bottom: 5%;
            right: 5%;
            width: 150px;
            height: auto;
        }
    
        /* ==============================================
           🕒 CIRCLE CLOCK STYLE (MATCHES GLASS THEME)
           ============================================== */
        .clock-circle{
            width:120px;
            height:120px;
            border-radius:50%;
            background:rgba(255,255,255,0.1);
            border:1px solid rgba(255,255,255,0.3);
            backdrop-filter:blur(8px);
            display:flex;
            align-items:center;
            justify-content:center;
            color:#fff;
            font-size:18px;
            font-weight:bold;
            margin:0 auto;
            position:relative;
            top: -49px;
            z-index:3;
            text-shadow:0 2px 6px rgba(0,0,0,0.4);
        }
    
        
        
        /* 📱 MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            /* Smaller Dino Game */
            .dino-game-container {
                width: 220px;
                height: 140px;
                top: 15px;
                left: 15px;
                padding: 8px;
            }
            .dino {
                width: 40px;
                height: 40px;
                left: 20px;
            }
            .cactus {
                width: 20px;
                height: 40px;
            }
            .ptero {
                width: 40px;
                height: 20px;
                bottom: 60px;
            }
            /* Smaller Glass Frame */
            .glass-frame {
                top:10px; left:10px; right:10px; bottom:10px;
                border-radius: 15px;
            }
            /* Hide rose decorations on mobile */
            .decoration {
                display: none;
            }
        }
        @media (max-width: 480px) {
            .button-container {
                flex-direction: column;
                width: 100%;
                max-width: 300px;
            }
            .resume-btn {
                width: 100%;
            }
            .clock-circle {
                width: 100px;
                height: 100px;
                font-size: 16px;
                top: -20px;
            }
        }

        /* ==============================================
           📱 RESPONSIVE DESIGN
           ============================================== */
        @media (max-width: 480px) {
            .button-container {
                flex-direction: column;
                width: 100%;
                max-width: 300px;
            }
            .resume-btn {
                width: 100%;
            }
            .decoration {
                display: none; /* Hide decorations on mobile for clean look */
            }
        }
        
    </style>
</head>
<body>
       <!-- 🖼️ GLASS FRAME ELEMENT (ADDED HERE) -->
       <div class="glass-frame"></div>
       
    <!-- 🎀 ADD DECORATION PICTURES HERE -->
    <!-- Replace the src with your own image paths -->
    <img src="https://i.pinimg.com/originals/cd/4a/dd/cd4addb03dbfb01b2fe3072990e42ea6.gif" alt="Decoration" class="decoration decoration-rose">
    <img src="https://i.pinimg.com/originals/cd/4a/dd/cd4addb03dbfb01b2fe3072990e42ea6.gif" alt="Decoration" class="decoration decoration-rose-2">
    

    <h1>PORTFOLIO</h1>
    <p class="subtitle">Choose your resume to view</p>
    <!-- 🕒 CIRCLE CLOCK - PERFECT POSITION -->
    <div class="clock-circle" id="clock"></div>

    <div class="button-container">
        <a href="cv1.html" class="resume-btn">Aiko</a>
        <a href="cv2.html" class="resume-btn">YIMWAN</a>
    </div>

    <!-- 🕒 LIVE TIME SCRIPT - WORKS AUTOMATICALLY -->
    <script>
        function showLiveTime(){
            let now = new Date();
            let h = now.getHours();
            let m = now.getMinutes();
            let s = now.getSeconds();
            // Add zero for single digits (01:05:09 instead of 1:5:9)
            h = h < 10 ? "0"+h : h;
            m = m < 10 ? "0"+m : m;
            s = s < 10 ? "0"+s : s;
            // Update clock text
            document.getElementById("clock").innerText = h + ":" + m + ":" + s;
        }
        // Update time every 1 second
        setInterval(showLiveTime, 1000);
        // Show time immediately on load
        showLiveTime();
    </script>
</body>
</html>
